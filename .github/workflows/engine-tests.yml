name: Engine smoke test

# The slower loop: boot the real Godot project headlessly, prove the Godot <-> Core
# seam is intact, and run the GdUnit4 in-engine tests. Runs on every push and PR (docs/04).
on:
  push:
  pull_request:

jobs:
  smoke:
    name: Headless Godot smoke run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Pinned to match the local editor (Godot 4.7 .NET). Bump both together.
      - name: Set up Godot 4.7 (.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: true

      - name: Import project (generates .godot)
        run: godot --headless --path game --import

      - name: Build C# solution
        run: godot --headless --path game --build-solutions --quit

      - name: Headless smoke run
        run: |
          set -o pipefail
          OUTPUT=$(godot --headless --path game --quit-after 120 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Race ready" \
            || { echo "::error::Race scene did not boot — the Godot<->Core seam is broken"; exit 1; }
          echo "$OUTPUT" | grep -q "Race result" \
            || { echo "::error::No RaceResult emitted on exit — seam round-trip broken"; exit 1; }

      - name: Integration tests (GdUnit4, in-engine)
        run: |
          export GODOT_BIN="$(which godot)"
          godot --headless --path tests/Game.Tests --import
          dotnet test tests/Game.Tests/Game.Tests.csproj --settings tests/Game.Tests/.runsettings
